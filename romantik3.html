<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuzenler günü 💖</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #ff9a9e, #fad0c4);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Arial', sans-serif;
  }

  h1 {
    position: absolute;
    color: #fff;
    font-size: 2.5em;
    text-align: center;
    text-shadow: 0 0 10px #fff, 0 0 20px #ff69b4;
    animation: glow 1.5s infinite alternate;
    z-index: 2;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #ff69b4; }
    to { text-shadow: 0 0 20px #fff, 0 0 40px #ff1493; }
  }

  .heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(-45deg);
  }

  .heart:before,
  .heart:after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
  }

  .heart:before { top: -10px; left: 0; }
  .heart:after { left: 10px; top: 0; }

  @keyframes float {
    0% { transform: translateY(0) rotate(-45deg); opacity: 1; }
    50% { transform: translateY(-400px) rotate(-45deg) translateX(50px); opacity: 0.7; }
    100% { transform: translateY(-800px) rotate(-45deg) translateX(-50px); opacity: 0; }
  }
</style>
</head>
<body>
<h1>Sevgililer Günün Kutlu Olsun 💖</h1>

<script>
const colors = ['#FF69B4','#FF1493','#FFB6C1','#FFC0CB','#DB7093'];

function createHeart() {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.style.left = Math.random() * window.innerWidth + 'px';
  const size = 10 + Math.random() * 30;
  heart.style.width = size + 'px';
  heart.style.height = size + 'px';
  heart.style.background = colors[Math.floor(Math.random() * colors.length)];
  heart.style.animation = `float ${3 + Math.random() * 5}s linear forwards`;
  heart.style.zIndex = 1;

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 8000);
}

// Her 150ms’de yeni bir kalp oluştur
setInterval(createHeart, 150);
</script>
</body>
</html>
