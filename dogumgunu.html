<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğum Günün Kutlu Olsun 🎉</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #ffe0b2, #ffccbc);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Arial', sans-serif;
    animation: bgGlow 6s infinite alternate;
  }

  @keyframes bgGlow {
    0% { background: radial-gradient(circle, #ffe0b2, #ffccbc); }
    50% { background: radial-gradient(circle, #ffccff, #d1c4e9); }
    100% { background: radial-gradient(circle, #ffe0b2, #ffccbc); }
  }

  h1 {
    position: absolute;
    color: #fff;
    font-size: 3em;
    text-align: center;
    text-shadow: 0 0 10px #fff, 0 0 20px #ff4081;
    animation: glow 1.5s infinite alternate, colorChange 4s infinite alternate;
    z-index: 2;
  }

  @keyframes glow {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #ff4081; }
    to { text-shadow: 0 0 20px #fff, 0 0 40px #ff1744; }
  }

  @keyframes colorChange {
    0% { color: #fff; }
    25% { color: #ff4081; }
    50% { color: #ff80ab; }
    75% { color: #ff1744; }
    100% { color: #fff; }
  }

  .balloon, .heart {
    position: absolute;
    width: 20px;
    height: 20px;
    transform: rotate(-45deg);
    animation: float linear infinite;
  }

  .balloon {
    border-radius: 50% 50% 50% 50%;
  }

  .heart {
    background: red;
    border-radius: 5px;
  }

  .heart:before,
  .heart:after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
  }

  .heart:before { top: -10px; left: 0; }
  .heart:after { left: 10px; top: 0; }

  @keyframes float {
    0% { transform: translateY(0) rotate(-45deg); opacity: 1; }
    50% { transform: translateY(-400px) rotate(-45deg) translateX(var(--sway)); opacity: 0.7; }
    100% { transform: translateY(-800px) rotate(-45deg) translateX(calc(var(--sway)*-1)); opacity: 0; }
  }
</style>
</head>
<body>
<h1>Doğum Günün Kutlu Olsun Amca! 🎉💖</h1>

<script>
const colors = ['#FF69B4','#FF1493','#FFB6C1','#FFC107','#00E676','#2979FF'];

function createElement(type) {
  const elem = document.createElement('div');
  elem.className = type;
  elem.style.left = Math.random() * window.innerWidth + 'px';
  const size = 15 + Math.random() * 40;
  elem.style.width = size + 'px';
  elem.style.height = size + 'px';
  elem.style.background = colors[Math.floor(Math.random() * colors.length)];
  const duration = 3 + Math.random() * 5;
  elem.style.animation = `float ${duration}s linear forwards`;
  const sway = Math.random() * 100 - 50 + 'px';
  elem.style.setProperty('--sway', sway);
  document.body.appendChild(elem);
  setTimeout(() => elem.remove(), duration*1000);
}

// Her 100ms’de rastgele kalp veya balon oluştur
setInterval(() => {
  createElement(Math.random() < 0.5 ? 'heart' : 'balloon');
}, 100);
</script>
</body>
</html>
