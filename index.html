<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sevgililer Günü 🎉</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #ffe6e6;
        font-family: Arial, sans-serif;
        flex-direction: column;
    }

    .heart {
        width: 100px;
        height: 90px;
        position: relative;
        transform: rotate(-45deg);
        animation: beat 1s infinite;
    }

    .heart::before,
    .heart::after {
        content: "";
        width: 100px;
        height: 90px;
        background: red;
        border-radius: 50%;
        position: absolute;
    }

    .heart::before { top: -50px; left: 0; }
    .heart::after { left: 50px; top: 0; }

    @keyframes beat {
        0%, 100% { transform: scale(1) rotate(-45deg); }
        50% { transform: scale(1.2) rotate(-45deg); }
    }

    h1 {
        color: #ff3366;
        margin-top: 30px;
        text-align: center;
        animation: colorChange 2s infinite alternate;
    }

    @keyframes colorChange {
        0% { color: #ff3366; }
        50% { color: #ff6699; }
        100% { color: #ff99cc; }
    }
</style>
</head>
<body>

<div class="heart"></div>
<h1>💖 Mutlu Sevgililer Günü! 💖</h1>

</body>
</html>
